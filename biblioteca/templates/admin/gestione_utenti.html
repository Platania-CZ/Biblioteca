{% extends 'home.html' %}

{% block content %}
<div class="container">
    <h2 class="mb-4">Gestione Utenti</h2>

    <!-- Pulsante per aggiungere un nuovo utente -->
    <div class="mb-3">
        <a href="{{ url_for('gestione.registrazione') }}" class="btn btn-success">
            ➕ Nuovo Utente
        </a>
    </div>

    <table class="table table-striped table-hover">
        <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Ruolo</th>
                <th>Azioni</th>
            </tr>
        </thead>
        <tbody>
            {% for utente in utenti %}
            <tr>
                <td>{{ utente.id }}</td>
                <td>{{ utente.username }}</td>
                <td>{{ utente.email_address }}</td>
                <td>
                    <span class="badge {% if utente.is_amministratore %}bg-danger{% else %}bg-primary{% endif %}">
                        {{ utente.ruolo }}
                    </span>
                </td>
                <td class="d-flex gap-2">

                    <!-- Modifica utente -->
                    <a href="{{ url_for('modifica_utente', utente_id=utente.id) }}" 
                       class="btn btn-sm btn-info">
                        ✏️ Modifica
                    </a>

                    <!-- Cambia password -->
                    <a href="{{ url_for('cambio_password_admin', utente_id=utente.id) }}" 
                       class="btn btn-sm btn-warning">
                        🔑 Password
                    </a>

                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
