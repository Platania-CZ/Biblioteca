{% macro light_or_dark_mode(element) %}
<div class="theme-switcher d-inline-block">
    {% if request.args.get('mode') == "dark" %}
        <a href="{{ request.path }}" class="btn btn-sm btn-outline-light">
            ☀️ Passa a Light Mode
        </a>

        <style>
            {{ element }} {
                background-color: #0f1419 !important;
                color: #e2e8f0 !important;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }

            /* Titoli */
            {{ element }} h1, {{ element }} h2, {{ element }} h3,
            {{ element }} h4, {{ element }} h5, {{ element }} h6 {
                color: #f8fafc !important;
            }

            /* Testi */
            {{ element }} p, {{ element }} span, {{ element }} li,
            {{ element }} label, {{ element }} small {
                color: #cbd5e1 !important;
            }

            /* Link */
            {{ element }} a:not(.btn) {
                color: #60a5fa !important;
                text-decoration: none;
            }
            {{ element }} a:not(.btn):hover {
                color: #93c5fd !important;
                text-decoration: underline;
            }

            /* Navbar */
            {{ element }} .navbar {
                background: linear-gradient(135deg, #0f1419 0%, #1e293b 100%) !important;
                border-bottom: 1px solid #334155 !important;
            }
            {{ element }} .navbar .nav-link,
            {{ element }} .navbar .navbar-brand {
                color: #f1f5f9 !important;
            }
            {{ element }} .navbar .nav-link:hover {
                color: #ffffff !important;
                background-color: rgba(255,255,255,0.1) !important;
            }

            /* Tabelle */
            {{ element }} .table {
                color: #e2e8f0 !important;
                border-color: #334155 !important;
                background-color: #0f1419 !important;
            }
            {{ element }} .table th {
                background: linear-gradient(135deg, #1e293b 0%, #334155 100%) !important;
                color: #f8fafc !important;
                border-bottom: 2px solid #475569 !important;
            }
            {{ element }} .table td {
                border-color: #334155 !important;
            }
            {{ element }} .table-striped > tbody > tr:nth-of-type(odd) > * {
                background-color: #1e293b !important;
            }
            {{ element }} .table-hover > tbody > tr:hover > * {
                background-color: #334155 !important;
            }

            /* Card */
            {{ element }} .card {
                background: linear-gradient(145deg, #1e293b 0%, #334155 100%) !important;
                border: 1px solid #475569 !important;
                color: #e2e8f0 !important;
            }
            {{ element }} .card-header, {{ element }} .card-footer {
                background-color: #1e293b !important;
                border-color: #475569 !important;
                color: #f8fafc !important;
            }

            /* Form */
            {{ element }} .form-control,
            {{ element }} .form-select {
                background-color: #1e293b !important;
                color: #f8fafc !important;
                border-color: #475569 !important;
            }
            {{ element }} .form-control::placeholder {
                color: #94a3b8 !important;
            }
            {{ element }} .form-control:focus,
            {{ element }} .form-select:focus {
                background-color: #334155 !important;
                color: #ffffff !important;
                border-color: #60a5fa !important;
                box-shadow: 0 0 0 0.25rem rgba(96, 165, 250, 0.25) !important;
            }

            /* Footer */
            {{ element }} footer {
                background: linear-gradient(135deg, #0f1419 0%, #1e293b 100%) !important;
                border-top: 1px solid #334155 !important;
                color: #94a3b8 !important;
            }

            /* Alert */
            {{ element }} .alert-success {
                background: linear-gradient(135deg, #166534 0%, #237a44 100%) !important;
                color: #dcfce7 !important;
                border-color: #22c55e !important;
            }
            {{ element }} .alert-danger {
                background: linear-gradient(135deg, #991b1b 0%, #dc2626 100%) !important;
                color: #fee2e2 !important;
                border-color: #ef4444 !important;
            }
            {{ element }} .alert-info {
                background: linear-gradient(135deg, #0369a1 0%, #0891b2 100%) !important;
                color: #cffafe !important;
                border-color: #06b6d4 !important;
            }
            {{ element }} .alert-warning {
                background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%) !important;
                color: #fef3c7 !important;
                border-color: #f59e0b !important;
            }
        </style>

    {% else %}
        <a href="{{ request.path }}?mode=dark" class="btn btn-sm btn-outline-dark">
            🌙 Passa a Dark Mode
        </a>

        <style>
            {{ element }} {
                background-color: #f8fafc !important;
                color: #1e293b !important;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }

            /* Titoli */
            {{ element }} h1, {{ element }} h2, {{ element }} h3,
            {{ element }} h4, {{ element }} h5, {{ element }} h6 {
                color: #0f172a !important;
            }

            /* Testi */
            {{ element }} p, {{ element }} span, {{ element }} li,
            {{ element }} label, {{ element }} small {
                color: #475569 !important;
            }

            /* Link */
            {{ element }} a:not(.btn) {
                color: #2563eb !important;
                text-decoration: none;
            }
            {{ element }} a:not(.btn):hover {
                color: #1d4ed8 !important;
                text-decoration: underline;
            }

            /* Navbar */
            {{ element }} .navbar {
                background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%) !important;
                border-bottom: 1px solid #cbd5e1 !important;
            }
            {{ element }} .navbar .nav-link,
            {{ element }} .navbar .navbar-brand {
                color: #1e293b !important;
            }

            /* Tabelle */
            {{ element }} .table {
                color: #1e293b !important;
                background-color: #ffffff !important;
            }
            {{ element }} .table th {
                background-color: #f1f5f9 !important;
                color: #1e293b !important;
                border-bottom: 2px solid #e2e8f0 !important;
            }
            {{ element }} .table td {
                color: #475569 !important;
                border-color: #e2e8f0 !important;
            }

            /* Card */
            {{ element }} .card {
                background-color: #ffffff !important;
                border: 1px solid #e2e8f0 !important;
                color: #1e293b !important;
            }
            {{ element }} .card-header, {{ element }} .card-footer {
                background-color: #f8fafc !important;
                border-color: #e2e8f0 !important;
                color: #1e293b !important;
            }

            /* Form */
            {{ element }} .form-control,
            {{ element }} .form-select {
                background-color: #ffffff !important;
                color: #1e293b !important;
                border-color: #d1d5db !important;
            }
            {{ element }} .form-label {
                color: #374151 !important;
            }

            /* Footer */
            {{ element }} footer {
                background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%) !important;
                color: #64748b !important;
                border-top: 1px solid #e2e8f0 !important;
            }
        </style>
    {% endif %}
</div>
{% endmacro %}
