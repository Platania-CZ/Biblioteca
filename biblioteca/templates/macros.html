{% macro light_or_dark_mode(element) %}
<div class="theme-switcher d-inline-block">
    {% if request.args.get('mode') == "dark" %}
        <a href="{{ request.path }}" class="btn btn-sm btn-outline-light">
            ☀️ Passa a Light Mode
        </a>

        <style>
            {{ element }} {
                background-color: #1a252f !important; /* Grigio bluastro profondo */
                color: #e0e0e0 !important;
                transition: background-color 0.3s ease, color 0.3s ease;
            }

            /* Link chiari su sfondo scuro per contrasto */
            {{ element }} a:not(.btn) {
                color: #9ecbff !important; 
                text-decoration: underline;
            }

            /* Supporto specifico per tabelle Bootstrap */
            {{ element }} .table {
                color: #e0e0e0 !important;
                border-color: #34495e !important;
            }
            
            {{ element }} .table th, 
            {{ element }} .table td {
                background-color: transparent !important;
                color: #e0e0e0 !important;
                border-bottom-color: #34495e !important;
            }

            /* Footer e card in dark mode */
            footer, .card {
                background-color: #2c3e50 !important;
                border-color: #34495e !important;
            }
        </style>

    {% else %}
        <a href="{{ request.path }}?mode=dark" class="btn btn-sm btn-outline-dark">
            🌙 Passa a Dark Mode
        </a>

        <style>
            {{ element }} {
                background-color: #f8f9fa !important;
                color: #212529 !important;
                transition: background-color 0.3s ease, color 0.3s ease;
            }

            /* Link scuri su sfondo chiaro */
            {{ element }} a:not(.btn) {
                color: #0d6efd !important;
            }

            {{ element }} .table {
                color: #212529 !important;
            }
        </style>
    {% endif %}
</div>
{% endmacro %}
