{% macro light_or_dark_mode(element) %}
<div class="theme-switcher d-inline-block">
    {% if request.args.get('mode') == "dark" %}
        <a href="{{ request.path }}" class="btn btn-sm btn-outline-light">
            ☀️ Passa a Light Mode
        </a>

        <style>
            {{ element }} {
                background-color: #1a252f !important;
                color: #f0f0f0 !important;
                transition: background-color 0.3s ease, color 0.3s ease;
            }

            /* Titoli e heading */
            {{ element }} h1, {{ element }} h2, {{ element }} h3,
            {{ element }} h4, {{ element }} h5, {{ element }} h6 {
                color: #ffffff !important;
            }

            /* Paragrafi e testi generici */
            {{ element }} p, {{ element }} span, {{ element }} li,
            {{ element }} label, {{ element }} small {
                color: #dce3ea !important;
            }

            /* Link */
            {{ element }} a:not(.btn) {
                color: #7eb8f7 !important;
                text-decoration: underline;
            }
            {{ element }} a:not(.btn):hover {
                color: #add4ff !important;
            }

            /* Navbar */
            {{ element }} .navbar {
                background-color: #111d27 !important;
                border-bottom: 1px solid #2e4057 !important;
            }
            {{ element }} .navbar .nav-link,
            {{ element }} .navbar .navbar-brand {
                color: #f0f0f0 !important;
            }
            {{ element }} .navbar .nav-link:hover {
                color: #ffffff !important;
            }

            /* Tabelle */
            {{ element }} .table {
                color: #dce3ea !important;
                border-color: #34495e !important;
            }
            {{ element }} .table th {
                background-color: #1e3040 !important;
                color: #ffffff !important;
                border-bottom-color: #4a6278 !important;
            }
            {{ element }} .table td {
                background-color: transparent !important;
                color: #dce3ea !important;
                border-bottom-color: #2e4057 !important;
            }
            {{ element }} .table-striped > tbody > tr:nth-of-type(odd) > * {
                background-color: #1e2f3d !important;
                color: #dce3ea !important;
            }
            {{ element }} .table-hover > tbody > tr:hover > * {
                background-color: #243b50 !important;
                color: #ffffff !important;
            }

            /* Card */
            {{ element }} .card {
                background-color: #1e2f3d !important;
                border-color: #2e4057 !important;
                color: #dce3ea !important;
            }
            {{ element }} .card-header, {{ element }} .card-footer {
                background-color: #16232e !important;
                border-color: #2e4057 !important;
                color: #ffffff !important;
            }

            /* Form */
            {{ element }} .form-control,
            {{ element }} .form-select {
                background-color: #1e2f3d !important;
                color: #f0f0f0 !important;
                border-color: #4a6278 !important;
            }
            {{ element }} .form-control::placeholder {
                color: #7a9ab0 !important;
            }
            {{ element }} .form-control:focus,
            {{ element }} .form-select:focus {
                background-color: #243b50 !important;
                color: #ffffff !important;
                border-color: #7eb8f7 !important;
                box-shadow: 0 0 0 0.2rem rgba(126, 184, 247, 0.25) !important;
            }
            {{ element }} .form-label {
                color: #dce3ea !important;
            }

            /* Footer */
            {{ element }} footer {
                background-color: #111d27 !important;
                border-top: 1px solid #2e4057 !important;
                color: #aab8c2 !important;
            }

            /* Alert */
            {{ element }} .alert-success {
                background-color: #1a3a2a !important;
                color: #7dffb3 !important;
                border-color: #2d6a4f !important;
            }
            {{ element }} .alert-danger {
                background-color: #3a1a1a !important;
                color: #ffadad !important;
                border-color: #6a2d2d !important;
            }
            {{ element }} .alert-info {
                background-color: #1a2e3a !important;
                color: #a8d8f0 !important;
                border-color: #2d5a6a !important;
            }
            {{ element }} .alert-warning {
                background-color: #3a2e1a !important;
                color: #ffd580 !important;
                border-color: #6a4e2d !important;
            }
        </style>

    {% else %}
        <a href="{{ request.path }}?mode=dark" class="btn btn-sm btn-outline-dark">
            🌙 Passa a Dark Mode
        </a>

        <style>
            {{ element }} {
                background-color: #f8f9fa !important;
                color: #212529 !important;
                transition: background-color 0.3s ease, color 0.3s ease;
            }

            /* Titoli */
            {{ element }} h1, {{ element }} h2, {{ element }} h3,
            {{ element }} h4, {{ element }} h5, {{ element }} h6 {
                color: #1a1a2e !important;
            }

            /* Testi generici */
            {{ element }} p, {{ element }} span, {{ element }} li,
            {{ element }} label, {{ element }} small {
                color: #343a40 !important;
            }

            /* Link */
            {{ element }} a:not(.btn) {
                color: #0d6efd !important;
            }
            {{ element }} a:not(.btn):hover {
                color: #0a58ca !important;
            }

            /* Navbar */
            {{ element }} .navbar {
                background-color: #e9ecef !important;
                border-bottom: 1px solid #ced4da !important;
            }
            {{ element }} .navbar .nav-link,
            {{ element }} .navbar .navbar-brand {
                color: #212529 !important;
            }

            /* Tabelle */
            {{ element }} .table {
                color: #212529 !important;
            }
            {{ element }} .table th {
                background-color: #dee2e6 !important;
                color: #1a1a2e !important;
            }
            {{ element }} .table td {
                color: #343a40 !important;
            }

            /* Card */
            {{ element }} .card {
                background-color: #ffffff !important;
                border-color: #dee2e6 !important;
                color: #212529 !important;
            }
            {{ element }} .card-header, {{ element }} .card-footer {
                background-color: #f1f3f5 !important;
                color: #1a1a2e !important;
            }

            /* Form */
            {{ element }} .form-control,
            {{ element }} .form-select {
                background-color: #ffffff !important;
                color: #212529 !important;
                border-color: #ced4da !important;
            }
            {{ element }} .form-label {
                color: #343a40 !important;
            }

            /* Footer */
            {{ element }} footer {
                background-color: #e9ecef !important;
                color: #495057 !important;
                border-top: 1px solid #ced4da !important;
            }
        </style>
    {% endif %}
</div>
{% endmacro %}
